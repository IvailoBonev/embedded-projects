<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RGB LED Control</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <h1>RGB LED Control</h1>

    <div class="card">
      <div id="preview"></div>

      <div class="slider-row">
        <label class="r-label">R</label>
        <input
          type="range"
          id="rSlider"
          min="0"
          max="255"
          value="0"
          oninput="update()"
        />
        <span class="val" id="rVal">0</span>
      </div>

      <div class="slider-row">
        <label class="g-label">G</label>
        <input
          type="range"
          id="gSlider"
          min="0"
          max="255"
          value="50"
          oninput="update()"
        />
        <span class="val" id="gVal">50</span>
      </div>

      <div class="slider-row">
        <label class="b-label">B</label>
        <input
          type="range"
          id="bSlider"
          min="0"
          max="255"
          value="125"
          oninput="update()"
        />
        <span class="val" id="bVal">125</span>
      </div>

      <button onclick="sendColor()">Set Color</button>
      <button onclick="resetColor()">Reset Color</button>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
